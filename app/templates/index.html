<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ACEest Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
  --gold:#d4af37;
  --dark:#0d0d0d;
}

body {
  background: var(--dark);
  color: #eee;
  font-family: 'Segoe UI', sans-serif;
}

/* NAVBAR */
.navbar {
  background: linear-gradient(90deg,#d4af37,#f5d76e);
}

/* HERO */
.hero {
  text-align:center;
  padding:40px;
}
.hero h1 {
  color:var(--gold);
  font-weight:900;
}

/* SECTION */
.section {
  margin-top:50px;
}

/* CARD */
.card {
  background:#1a1a1a;
  border-radius:12px;
  padding:20px;
}

/* INPUT */
.form-control {
  background:#222;
  color:#fff;
  border:1px solid #444;
}
.form-control::placeholder {
  color:#aaa;
}

/* BUTTON */
.btn-gold {
  background:var(--gold);
  border:none;
  font-weight:bold;
}

/* PROGRAM */
.program {
  border-left:4px solid var(--gold);
}

/* LIST */
.list-group-item {
  background:#222;
  border:none;
  margin-bottom:5px;
}
</style>
</head>

<body>

<nav class="navbar">
<div class="container-fluid">
<span class="navbar-brand fw-bold">⚡ ACEest FITNESS</span>
</div>
</nav>

<div class="hero">
<h1>ACEest FUNCTIONAL FITNESS</h1>
<p class="text-secondary">Dashboard</p>
</div>

<div class="container-fluid px-5">

<!-- PROGRAMS -->
<div class="section">
<h4 style="color:var(--gold)">🏋️ Programs</h4>
<div class="row g-4" id="programs"></div>
</div>

<!-- CALCULATOR -->
<div class="section">
<h4 style="color:var(--gold)">🔥 Calorie Calculator</h4>
<div class="row">
<div class="col-md-4">
<div class="card">
<input id="weight" class="form-control mb-2" placeholder="Weight">
<select id="program" class="form-control mb-2">
<option value="">Select</option>
<option value="FL">Fat Loss</option>
<option value="MG">Muscle Gain</option>
<option value="BG">Beginner</option>
</select>
<button class="btn btn-gold w-100" onclick="calc()">Calculate</button>
<div id="result" class="mt-2 text-center"></div>
</div>
</div>
</div>
</div>

<!-- WORKOUT + MEMBERS -->
<div class="section">
<h4 style="color:var(--gold)">📋 Manage Data</h4>

<div class="row g-4">

<!-- WORKOUT -->
<div class="col-md-6">
<div class="card">
<h5>Add Workout</h5>
<input id="wname" class="form-control mb-2" placeholder="Workout name">
<input id="wdur" class="form-control mb-2" placeholder="Duration">
<button class="btn btn-gold w-100 mb-3" onclick="addWorkout()">Add</button>

<ul id="workouts" class="list-group"></ul>
</div>
</div>

<!-- MEMBERS -->
<div class="col-md-6">
<div class="card">
<h5>Register Member</h5>
<input id="mname" class="form-control mb-2" placeholder="Name">
<input id="memail" class="form-control mb-2" placeholder="Email">
<button class="btn btn-gold w-100 mb-3" onclick="addMember()">Register</button>

<ul id="members" class="list-group"></ul>
</div>
</div>

</div>
</div>

</div>

<script>

// PROGRAMS
async function loadPrograms(){
let res=await fetch('/programs');
let data=await res.json();
let div=document.getElementById('programs');
div.innerHTML='';

Object.entries(data).forEach(([k,v])=>{
div.innerHTML+=`
<div class="col-md-4">
<div class="card program">
<h5>${k}</h5>
<p>${v.diet}</p>
</div>
</div>`;
});
}

// CALCULATOR
async function calc(){
let w=document.getElementById('weight').value;
let p=document.getElementById('program').value;

let res=await fetch('/calories',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({weight_kg:w,program_code:p})
});

let d=await res.json();
document.getElementById('result').innerHTML=`<h3>${d.estimated_daily_kcal}</h3>`;
}

// WORKOUTS
async function loadWorkouts(){
let res=await fetch('/workouts');
let data=await res.json();
let ul=document.getElementById('workouts');
ul.innerHTML='';

data.forEach(w=>{
ul.innerHTML+=`<li class="list-group-item">${w.name} - ${w.duration_minutes}</li>`;
});
}

async function addWorkout(){
await fetch('/workouts',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
name:document.getElementById('wname').value,
duration_minutes:document.getElementById('wdur').value
})
});
loadWorkouts();
}

// MEMBERS
async function loadMembers(){
let res=await fetch('/members');
let data=await res.json();
let ul=document.getElementById('members');
ul.innerHTML='';

data.forEach(m=>{
ul.innerHTML+=`<li class="list-group-item">${m.name} (${m.email})</li>`;
});
}

async function addMember(){
await fetch('/members',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
name:document.getElementById('mname').value,
email:document.getElementById('memail').value
})
});
loadMembers();
}

// INIT
loadPrograms();
loadWorkouts();
loadMembers();

</script>

</body>
</html>
